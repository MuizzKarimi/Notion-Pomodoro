<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boss Fight Pomodoro</title>

  <style>
    :root{
      --bg:#191919;
      --card:#151515;
      --text:#e6edf3;
      --muted:#9aa4af;
      --line:rgba(255,255,255,.08);
      --accent:#c9a7ff;
      --danger:#ff5a7a;
    }
    *{ box-sizing:border-box; }

    html, body{
      margin:0; padding:0;
      width:100%; height:100%;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    .frame{
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
      background:var(--bg);
    }

    .card{
      width:100%;
      max-width:520px;
      background: radial-gradient(1200px 600px at 30% -10%, rgba(201,167,255,.18), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(122,162,255,.12), transparent 55%),
                  var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .title h1{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:12.5px;
    }

    .chip{
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .boss{
      display:flex;
      align-items:center;
      justify-content:center;
      margin:10px 0 8px;
      font-size:44px;
      line-height:1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }

    .section{
      margin-top:10px;
      border-top:1px solid rgba(255,255,255,.06);
      padding-top:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:12.5px;
      margin-bottom:8px;
    }

    .bar{
      width:100%;
      height:12px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
    }
    .fill{
      height:100%;
      width:100%;
      background: linear-gradient(90deg, rgba(255,90,122,.95), rgba(201,167,255,.95));
      transition: width .35s ease;
    }

    .center{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 0 8px;
    }

    .statepill{
      border:1px solid rgba(201,167,255,.45);
      background:rgba(201,167,255,.10);
      color:#eeddff;
      padding:5px 12px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.3px;
      font-size:12px;
    }

    .timer{
      font-size:64px;
      font-weight:900;
      letter-spacing:1px;
      line-height:1;
      color:#f0f6fc;
      text-shadow: 0 10px 40px rgba(0,0,0,.55);
    }

    .btnrow{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:8px;
    }

    button{
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--text);
      border-radius:12px;
      padding:10px 18px;
      font-weight:800;
      cursor:pointer;
      transition: border-color .2s ease, transform .05s ease, background .2s ease;
      min-width:120px;
    }
    button:hover{ border-color:rgba(201,167,255,.6); background:rgba(201,167,255,.08); }
    button:active{ transform: translateY(1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    .meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      flex-wrap:wrap;
    }

    /* NEW: +/- controls */
    .adjust{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .iconbtn{
      width:34px;
      height:34px;
      min-width:34px;
      padding:0;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(201,167,255,.35);
      background:rgba(0,0,0,.22);
      color:var(--text);
      font-weight:1000;
      font-size:16px;
      line-height:1;
      cursor:pointer;
      transition: border-color .2s ease, background .2s ease, transform .05s ease;
    }
    .iconbtn:hover{
      border-color:rgba(201,167,255,.7);
      background:rgba(201,167,255,.10);
    }
    .iconbtn:active{ transform: translateY(1px); }
    .iconbtn:disabled{ opacity:.35; cursor:not-allowed; }

    .sync{
      margin-top:14px;
      border-top:1px solid rgba(255,255,255,.06);
      padding-top:12px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }
    .sync input{
      flex:1;
      min-width:190px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.28);
      color:var(--text);
      border-radius:12px;
      padding:9px 12px;
      outline:none;
    }
    .sync input:focus{ border-color:rgba(201,167,255,.55); }

    .tinybtn{
      min-width:auto;
      padding:9px 12px;
      border-radius:12px;
      font-size:12px;
      font-weight:900;
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="card" role="application" aria-label="Boss Fight Pomodoro and 360 hour health bar">
      <div class="header">
        <div class="title">
          <h1>⚔️ Boss Fight Timer</h1>
          <p class="subtitle">Complete Pomodoros to defeat the boss.</p>
        </div>
        <div class="chip" id="status">Ready</div>
      </div>

      <div class="boss" aria-hidden="true">🐉</div>

      <div class="section">
        <div class="row">
          <div>Boss Health (hours)</div>
          <div><span id="health">360.0</span> / 360</div>
        </div>
        <div class="bar" aria-label="boss health bar">
          <div class="fill" id="healthFill"></div>
        </div>
      </div>

      <div class="center">
        <div class="statepill" id="statePill">HEALTHY</div>
        <div class="timer" id="time">30:00</div>

        <div class="btnrow">
          <button id="startBtn">Start</button>
          <button id="pauseBtn" disabled>Pause</button>
        </div>
      </div>

      <div class="meta">
        <div>Pomodoros completed: <b id="pomos">0</b> / 720</div>

        <div class="adjust">
          <button class="iconbtn" id="minusBtn" title="Remove 1 pomodoro">−</button>
          <button class="iconbtn" id="plusBtn" title="Add 1 pomodoro">+</button>
        </div>

        <div>Damage dealt: <b id="damage">0.0</b> / 360h</div>
      </div>

      <div class="sync">
        <div>Sync Key</div>
        <input id="syncKeyInput" />
        <button class="tinybtn" id="copyKeyBtn">Copy</button>
        <button class="tinybtn" id="useKeyBtn">Use</button>
      </div>
      <!-- bottom hint text REMOVED -->
    </div>
  </div>

  <script type="module">
    // ========= SETTINGS =========
    const POMO_SECONDS = 30 * 60;   // 30 minutes
    const GOAL_HOURS = 360;
    const HOURS_PER_POMO = 0.5;
    const GOAL_POMOS = Math.round(GOAL_HOURS / HOURS_PER_POMO); // 720

    const LOCAL_SYNC_KEY = "notion_boss_pomo_sync_key_v1";
    const LOCAL_BACKUP_PROGRESS_BASE = "notion_boss_progress_backup_v1";
function backupKeyFor(k){
  return `${LOCAL_BACKUP_PROGRESS_BASE}:${k}`;
}
    // ========= UI =========
    const els = {
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      statePill: document.getElementById("statePill"),
      start: document.getElementById("startBtn"),
      pause: document.getElementById("pauseBtn"),
      health: document.getElementById("health"),
      healthFill: document.getElementById("healthFill"),
      pomos: document.getElementById("pomos"),
      damage: document.getElementById("damage"),
      plus: document.getElementById("plusBtn"),
      minus: document.getElementById("minusBtn"),
      syncInput: document.getElementById("syncKeyInput"),
      copyKey: document.getElementById("copyKeyBtn"),
      useKey: document.getElementById("useKeyBtn"),
    };

    let intervalId = null;
    let remaining = POMO_SECONDS;
    let running = false;

    let progress = { completedPomos: 0, updatedAt: 0 };

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const fmtTime = (sec) => {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    };

    function setStatus(t){ els.status.textContent = t; }

    function stateLabel(healthHours){
      const pct = healthHours / GOAL_HOURS;
      if (pct <= 0) return "DEFEATED";
      if (pct <= 0.25) return "CRITICAL";
      if (pct <= 0.50) return "HURT";
      return "HEALTHY";
    }

    function updateUI(){
      els.time.textContent = fmtTime(remaining);

      const damageHours = progress.completedPomos * HOURS_PER_POMO;
      const healthHours = clamp(GOAL_HOURS - damageHours, 0, GOAL_HOURS);

      els.health.textContent = healthHours.toFixed(1);
      els.pomos.textContent = progress.completedPomos;
      els.damage.textContent = damageHours.toFixed(1);

      const healthPct = (healthHours / GOAL_HOURS) * 100;
      els.healthFill.style.width = clamp(healthPct, 0, 100) + "%";

      const label = stateLabel(healthHours);
      els.statePill.textContent = label;

      if(label === "DEFEATED"){
        els.statePill.style.borderColor = "rgba(255,90,122,.55)";
        els.statePill.style.background = "rgba(255,90,122,.12)";
      } else if(label === "CRITICAL"){
        els.statePill.style.borderColor = "rgba(255,90,122,.35)";
        els.statePill.style.background = "rgba(255,90,122,.08)";
      } else {
        els.statePill.style.borderColor = "rgba(201,167,255,.45)";
        els.statePill.style.background = "rgba(201,167,255,.10)";
      }

      // +/- disable limits
      els.minus.disabled = progress.completedPomos <= 0;
      els.plus.disabled = progress.completedPomos >= GOAL_POMOS;
    }

    // ========= Local backup =========
    function loadLocalBackup(){
  try{
    const raw = localStorage.getItem(backupKeyFor(syncKey));
    if(!raw) return;

    const data = JSON.parse(raw);

    if(typeof data?.completedPomos === "number"){
      progress.completedPomos = clamp(Math.floor(data.completedPomos), 0, GOAL_POMOS);
    }
    if(typeof data?.updatedAt === "number"){
      progress.updatedAt = data.updatedAt;
    }
  }catch(e){}
}
    function saveLocalBackup(){
  try{
    localStorage.setItem(
      backupKeyFor(syncKey),
      JSON.stringify(progress)
    );
  }catch(e){}
}

    // ========= Sync Key =========
    function randomKey(){ return crypto.randomUUID() + "-" + crypto.randomUUID(); }

    function getSyncKey(){
      let k = localStorage.getItem(LOCAL_SYNC_KEY);
      if(!k){
        k = randomKey();
        localStorage.setItem(LOCAL_SYNC_KEY, k);
      }
      return k;
    }

    let syncKey = getSyncKey();
    els.syncInput.value = syncKey;

    // ========= Firebase optional =========
    let db = null;
    let doc = null;
    let getDoc = null;
    let setDoc = null;
    let onSnapshot = null;
    let unsub = null;

    function docRef(){
      return doc(db, "pomoProgress", syncKey);
    }

    async function pullRemoteOnce(){
      if(!db) return;
      const snap = await getDoc(docRef());
      if(snap.exists()){
        const data = snap.data();
        const remoteUpdatedAt = typeof data.updatedAt === "number" ? data.updatedAt : 0;
        if(remoteUpdatedAt >= (progress.updatedAt || 0)){
          if(typeof data.completedPomos === "number"){
            progress.completedPomos = clamp(Math.floor(data.completedPomos), 0, GOAL_POMOS);
          }
          progress.updatedAt = remoteUpdatedAt;
          saveLocalBackup();
        }
      } else {
        await setDoc(docRef(), { completedPomos: progress.completedPomos, updatedAt: Date.now() }, { merge: true });
      }
      updateUI();
    }

    function subscribeToRemote(){
      if(!db) return;
      if(unsub) unsub();
      unsub = onSnapshot(docRef(), (snap) => {
        if(!snap.exists()) return;
        const data = snap.data();
        const remoteUpdatedAt = typeof data.updatedAt === "number" ? data.updatedAt : 0;
        if(remoteUpdatedAt > (progress.updatedAt || 0)){
          if(typeof data.completedPomos === "number"){
            progress.completedPomos = clamp(Math.floor(data.completedPomos), 0, GOAL_POMOS);
          }
          progress.updatedAt = remoteUpdatedAt;
          saveLocalBackup();
          updateUI();
        }
      });
    }

    async function pushProgress(){
      saveLocalBackup();
      if(!db) return;
      progress.updatedAt = Date.now();
      await setDoc(docRef(), { completedPomos: progress.completedPomos, updatedAt: progress.updatedAt }, { merge:true });
    }

    function setSyncKey(newKey){
      const cleaned = (newKey || "").trim();
      if(!cleaned) return;
      syncKey = cleaned;
      progress = { completedPomos: 0, updatedAt: 0 };
loadLocalBackup();
updateUI();
      localStorage.setItem(LOCAL_SYNC_KEY, syncKey);
      els.syncInput.value = syncKey;

      if(db){
        subscribeToRemote();
        pullRemoteOnce().catch(()=>{});
      }

      setStatus("Synced");
      setTimeout(() => setStatus("Ready"), 900);
    }

    els.copyKey.addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(syncKey);
        setStatus("Key copied");
      } catch(e){
        els.syncInput.focus();
        els.syncInput.select();
        setStatus("Select + copy");
      }
      setTimeout(() => setStatus("Ready"), 900);
    });
    els.useKey.addEventListener("click", () => setSyncKey(els.syncInput.value));

    // ========= Timer =========
    function start(){
      if(running) return;
      running = true;
      els.start.disabled = true;
      els.pause.disabled = false;
      setStatus("Running");

      intervalId = setInterval(() => {
        remaining -= 1;
        if(remaining <= 0){
          completePomodoro();
        }
        updateUI();
      }, 1000);
    }

    function pause(){
      if(!running) return;
      running = false;
      els.start.disabled = false;
      els.pause.disabled = true;
      setStatus("Paused");
      clearInterval(intervalId);
      intervalId = null;
    }

    function resetTimer(){ remaining = POMO_SECONDS; }

    async function completePomodoro(){
      clearInterval(intervalId);
      intervalId = null;
      running = false;

      if(progress.completedPomos < GOAL_POMOS){
        progress.completedPomos += 1;
        updateUI();
        await pushProgress().catch(()=>{});
      }

      resetTimer();
      els.start.disabled = false;
      els.pause.disabled = true;

      const damageHours = progress.completedPomos * HOURS_PER_POMO;
      if(damageHours >= GOAL_HOURS){
        setStatus("Boss defeated ✅");
      } else {
        setStatus("Damage dealt +0.5h");
        setTimeout(() => setStatus("Ready"), 1200);
      }
    }

    // ========= Manual +/- =========
    async function addManual(){
      if(progress.completedPomos >= GOAL_POMOS) return;
      progress.completedPomos += 1;
      updateUI();
      setStatus("+1 Pomodoro");
      setTimeout(() => setStatus(running ? "Running" : "Ready"), 900);
      await pushProgress().catch(()=>{});
    }

    async function removeManual(){
      if(progress.completedPomos <= 0) return;
      progress.completedPomos -= 1;
      updateUI();
      setStatus("-1 Pomodoro");
      setTimeout(() => setStatus(running ? "Running" : "Ready"), 900);
      await pushProgress().catch(()=>{});
    }

    els.start.addEventListener("click", start);
    els.pause.addEventListener("click", pause);
    els.plus.addEventListener("click", addManual);
    els.minus.addEventListener("click", removeManual);

    // ========= Init =========
    loadLocalBackup();
    updateUI();

    // Firebase init (optional; timer still works without it)
    (async () => {
      try{
        const firebaseConfig = {
          apiKey: "AIzaSyBvTg8pUjUQiHOzr1ryE3f0FjLAnesXAsc",
          authDomain: "pomodoro-notion-39b10.firebaseapp.com",
          projectId: "pomodoro-notion-39b10",
          storageBucket: "pomodoro-notion-39b10.firebasestorage.app",
          messagingSenderId: "1072647200630",
          appId: "1:1072647200630:web:f1ad500e8db31e87366457"
        };

        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js");
        const firestore = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js");
        const { getFirestore, doc: _doc, getDoc: _getDoc, setDoc: _setDoc, onSnapshot: _onSnapshot } = firestore;

        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        doc = _doc; getDoc = _getDoc; setDoc = _setDoc; onSnapshot = _onSnapshot;

        await pullRemoteOnce();
        subscribeToRemote();
        setStatus("Ready");
      } catch(e){
        setStatus("Local mode");
      }
    })();
  </script>
</body>
</html>
